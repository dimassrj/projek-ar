<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>AR Rambu Lalulintas</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.x/dist/aframe-extras.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
    <a-assets>
      <audio id="musik-bg" src="rambu-rambu-lalulintas.mp3" preload="auto"></audio>
    </a-assets>

    <a-marker preset="hiro" id="marker-utama" smooth="true" smoothCount="25" smoothTolerance="0.005" smoothThreshold="8">
      <!-- Parent entity untuk rotasi sudut pandang -->
      <a-entity rotation="-75 0 0">
        <a-entity
          gltf-model="perempatan_animasi1.glb"
          scale="0.08 0.08 0.08"
          position="0 0 0"
          animation-mixer="clip: *; loop: repeat">
        </a-entity>
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const marker = document.querySelector('#marker-utama');
    const musik = document.querySelector('#musik-bg');

    marker.addEventListener('markerFound', () => {
      musik.play().catch(() => {}); // catch biar gak error kalau browser blokir autoplay
    });

    marker.addEventListener('markerLost', () => {
      musik.pause();
    });
  </script>

</body>
</html>
